<!DOCTYPE html>

<head>

    name="viewport"

  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <style>
    :root {
      --blue-950: #172554;
      --blue-900: #1e3a8a;
      --blue-800: #1e40af;
      --blue-700: #1d4ed8;
      --blue-600: #2563eb;
      --blue-500: #3b82f6;
      --sky-500: #0ea5e9;
      --emerald-500: #10b981;
      --emerald-600: #059669;
      --orange-500: #f97316;
      --slate-950: #020617;
      --slate-900: #0f172a;
      --slate-800: #1e293b;
      --slate-700: #334155;
      --slate-600: #475569;
      --slate-500: #64748b;
      --slate-400: #94a3b8;
      --slate-300: #cbd5e1;
      --slate-200: #e2e8f0;
      --slate-100: #f1f5f9;
      --slate-50: #f8fafc;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
      background: #eff6ff;
    }

    body {
      min-width: 320px;
      margin: 0;
      color: var(--slate-800);
      font-family:
        "Noto Sans JP",
        "Hiragino Kaku Gothic ProN",
        "Yu Gothic",
        system-ui,
        -apple-system,
        BlinkMacSystemFont,
        sans-serif;
      line-break: strict;
      word-break: normal;
      overflow-wrap: break-word;
      background:
        radial-gradient(
          circle at 10% 6%,
          rgba(37, 99, 235, 0.27),
          transparent 25%
        ),
        radial-gradient(
          circle at 90% 20%,
          rgba(14, 165, 233, 0.17),
          transparent 28%
        ),
        linear-gradient(
          180deg,
          #eff6ff 0%,
          #f8fafc 48%,
          #ffffff 100%
        );
    }

    button,
    a {
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    button {
      font: inherit;
    }

    .screen {
      animation: fade-slide 0.32s ease both;
    }

    @keyframes fade-slide {
      from {
        opacity: 0;
        transform: translateY(14px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .jp-text {
      line-break: strict;
      word-break: normal;
      overflow-wrap: break-word;
      text-wrap: pretty;
    }

    .manual-break {
      word-break: keep-all;
      overflow-wrap: normal;
      line-height: 1.55;
    }

    .hero-panel {
      position: relative;
      isolation: isolate;
      background:
        linear-gradient(
          135deg,
          rgba(30, 64, 175, 0.99) 0%,
          rgba(37, 99, 235, 0.97) 48%,
          rgba(14, 165, 233, 0.95) 100%
        );
    }

    .hero-panel::before {
      position: absolute;
      z-index: -1;
      inset: 0;
      content: "";
      pointer-events: none;
      opacity: 0.65;
      background-image:
        linear-gradient(
          rgba(255, 255, 255, 0.075) 1px,
          transparent 1px
        ),
        linear-gradient(
          90deg,
          rgba(255, 255, 255, 0.075) 1px,
          transparent 1px
        );
      background-size: 28px 28px;
      mask-image: linear-gradient(
        180deg,
        rgba(0, 0, 0, 0.88),
        transparent 92%
      );
    }

    .hero-circle {
      position: absolute;
      border-radius: 9999px;
      pointer-events: none;
    }

    .glass-chip {
      border: 1px solid rgba(255, 255, 255, 0.22);
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(14px);
    }

    .soft-glass {
      border: 1px solid rgba(191, 219, 254, 0.8);
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(16px);
    }

    .choice-card,
    .primary-button,
    .secondary-button,
    .official-cta {
      transition:
        transform 0.25s ease,
        box-shadow 0.25s ease,
        background-color 0.25s ease,
        border-color 0.25s ease,
        filter 0.25s ease;
    }

    .choice-card {
      min-height: 66px;
    }

    .choice-card:hover {
      transform: translateY(-2px);
      border-color: var(--blue-600);
      background: #eff6ff;
      box-shadow: 0 14px 30px rgba(37, 99, 235, 0.13);
    }

    .choice-card:active {
      transform: translateY(0) scale(0.995);
    }

    .choice-card.is-selected {
      border-color: var(--blue-600);
      background: #dbeafe;
      box-shadow:
        0 14px 30px rgba(37, 99, 235, 0.16),
        0 0 0 1px rgba(37, 99, 235, 0.07);
    }

    .primary-button:hover,
    .secondary-button:hover,
    .official-cta:hover {
      transform: translateY(-2px);
    }

    .primary-button:active,
    .secondary-button:active,
    .official-cta:active {
      transform: translateY(1px) scale(0.99);
    }

    .primary-button:disabled {
      cursor: not-allowed;
      transform: none;
    }

    .shine {
      position: relative;
      overflow: hidden;
    }

    .shine::after {
      position: absolute;
      top: 0;
      left: -130%;
      width: 68%;
      height: 100%;
      content: "";
      pointer-events: none;
      transform: skewX(-18deg);
      transition: left 0.75s ease;
      background:
        linear-gradient(
          120deg,
          transparent,
          rgba(255, 255, 255, 0.4),
          transparent
        );
    }

    .shine:hover::after {
      left: 135%;
    }

    .official-cta {
      position: relative;
      display: flex;
      min-height: 60px;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.28);
      background:
        radial-gradient(
          circle at 18% 16%,
          rgba(255, 255, 255, 0.35),
          transparent 30%
        ),
        linear-gradient(
          135deg,
          #2563eb 0%,
          #0ea5e9 48%,
          #10b981 100%
        );
      box-shadow:
        0 19px 38px rgba(14, 165, 233, 0.32),
        inset 0 1px 0 rgba(255, 255, 255, 0.3);
    }

    .official-cta::before {
      position: absolute;
      inset: 2px;
      content: "";
      pointer-events: none;
      border-radius: 14px;
      background:
        linear-gradient(
          180deg,
          rgba(255, 255, 255, 0.22),
          transparent 58%
        );
    }

    .official-cta::after {
      position: absolute;
      top: -35%;
      left: -48%;
      width: 42%;
      height: 180%;
      content: "";
      pointer-events: none;
      transform: rotate(18deg);
      transition: left 0.72s ease;
      background:
        linear-gradient(
          90deg,
          transparent,
          rgba(255, 255, 255, 0.48),
          transparent
        );
    }

    .official-cta:hover {
      box-shadow:
        0 25px 50px rgba(16, 185, 129, 0.3),
        inset 0 1px 0 rgba(255, 255, 255, 0.32);
    }

    .official-cta:hover::after {
      left: 122%;
    }

    .bar-fill {
      transition: width 0.65s ease;
    }

    .result-bar-fill {
      width: 0;
      transition: width 0.75s ease;
    }

    .route-line {
      width: 2px;
      min-height: 42px;
      margin-top: 8px;
      background: #dbeafe;
    }

    .safe-bottom {
      padding-bottom:
        calc(24px + env(safe-area-inset-bottom, 0px));
    }

    @media (hover: none) {
      .choice-card:hover,
      .primary-button:hover,
      .secondary-button:hover,
      .official-cta:hover {
        transform: none;
      }

      .shine:hover::after,
      .official-cta:hover::after {
        left: -130%;
      }
    }

    @media (max-width: 390px) {
      .page-shell {
        padding:
          14px 12px
          calc(20px + env(safe-area-inset-bottom, 0px));
      }

      .hero-title {
        font-size: 25px;
        line-height: 1.28;
      }

      .result-title {
        font-size: 25px;
      }
    }

    @media (max-width: 350px) {
      .page-shell {
        padding-inline: 9px;
      }

      .hero-title {
        font-size: 23px;
      }

      .question-card {
        padding: 18px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      html {
        scroll-behavior: auto;
      }

      *,
      *::before,
      *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>

<body>

    function calculateIntermediateResult() {
      const scores = createEmptyScores();
      const rewardLevels = [];

      const rewardQuestions = questions.filter(
        (question) => question.section === "reward"
      );

      rewardQuestions.forEach((question, index) => {
        const selectedIndex = state.answers[index];
        const selectedOption = question.options[selectedIndex];

        if (!selectedOption) {
          return;
        }

        addScores(scores, selectedOption.scores);

        if (Number.isFinite(selectedOption.rewardLevel)) {
          rewardLevels.push(selectedOption.rewardLevel);
        }
      });

      const type = getTopJobType(scores);

      const percentages = normalizeScores(
        scores,
        rewardQuestions,
        15
      );

      const averageRewardLevel =
        rewardLevels.length > 0
          ? rewardLevels.reduce((sum, value) => sum + value, 0) /
            rewardLevels.length
          : 1;

      return {
        type,
        scores,
        percentages,
        averageRewardLevel
      };
    }

    function calculateTheoreticalMaxScores(targetQuestions) {
      return JOB_KEYS.reduce((maximumScores, jobType) => {
        maximumScores[jobType] = targetQuestions.reduce(
          (totalMaximum, question) => {
            const maxScore = Math.max(
              ...question.options.map(
                (option) => Number(option.scores?.[jobType]) || 0
              ),
              0
            );

            return totalMaximum + maxScore;
          },
          0
        );

        return maximumScores;
      }, {});
    }

    function normalizeScores(
      scores,
      targetQuestions,
      minimumPercentage = 15
    ) {
      const theoreticalMaximums =
        calculateTheoreticalMaxScores(targetQuestions);

      return JOB_KEYS.reduce((percentages, jobType) => {
        const actualScore = Number(scores[jobType]) || 0;
        const maximumScore =
          Number(theoreticalMaximums[jobType]) || 0;

        if (maximumScore <= 0) {
          percentages[jobType] = minimumPercentage;
          return percentages;
        }

        const calculated = Math.round(
          (actualScore / maximumScore) * 100
        );

        percentages[jobType] = Math.min(
          100,
          Math.max(minimumPercentage, calculated)
        );

        return percentages;
      }, {});
    }

    function calculateFinalResult() {
      const rewardScores = createEmptyScores();
      const aptitudeScores = createEmptyScores();
      const reasons = [];
      const rewardLevels = [];

      questions.forEach((question, questionIndex) => {
        const selectedIndex = state.answers[questionIndex];
        const selectedOption = question.options[selectedIndex];

        if (!selectedOption) {
          return;
        }

        if (question.section === "reward") {
          addScores(rewardScores, selectedOption.scores);

          if (Number.isFinite(selectedOption.rewardLevel)) {
            rewardLevels.push(selectedOption.rewardLevel);
          }
        }

        if (question.section === "aptitude") {
          addScores(aptitudeScores, selectedOption.scores);
        }

        if (selectedOption.reason) {
          reasons.push(selectedOption.reason);
        }
      });

      const averageRewardLevel =
        rewardLevels.length > 0
          ? rewardLevels.reduce((sum, value) => sum + value, 0) /
            rewardLevels.length
          : 1;

      const combinedScores = createEmptyScores();

      JOB_KEYS.forEach((jobType) => {
        combinedScores[jobType] =
          rewardScores[jobType] * 0.48 +
          aptitudeScores[jobType] * 0.52 +
          getRewardAlignmentBonus(jobType, averageRewardLevel);
      });

      const type = getTopJobType(combinedScores);

      const percentages = normalizeFinalScores(
        combinedScores,
        10
      );

      const sortedTypes = sortJobTypesByScore(combinedScores);

      return {
        type,
        content: resultContents[type],
        rewardScores,
        aptitudeScores,
        combinedScores,
        percentages,
        sortedTypes,
        reasons: selectRelevantReasons(reasons, type),
        averageRewardLevel
      };
    }

    function normalizeFinalScores(
      scores,
      minimumPercentage = 10
    ) {
      const maximumScore = Math.max(
        ...JOB_KEYS.map(
          (jobType) => Number(scores[jobType]) || 0
        ),
        1
      );

      return JOB_KEYS.reduce((percentages, jobType) => {
        const score = Number(scores[jobType]) || 0;

        percentages[jobType] = Math.min(
          100,
          Math.max(
            minimumPercentage,
            Math.round((score / maximumScore) * 100)
          )
        );

        return percentages;
      }, {});
    }

    function getRewardAlignmentBonus(jobType, rewardLevel) {
      const bonuses = {
        WEB_PRODUCE: {
          low: 4,
          middle: 5,
          high: 1
        },
        WEB_DESIGN: {
          low: 1,
          middle: 5,
          high: 3
        },
        VIDEO_EDIT: {
          low: 5,
          middle: 2,
          high: 0
        },
        ENGINEER: {
          low: 0,
          middle: 2,
          high: 7
        },
        WEB_WRITER: {
          low: 5,
          middle: 4,
          high: 2
        }
      };

      if (rewardLevel < 1.55) {
        return bonuses[jobType].low;
      }

      if (rewardLevel < 2.45) {
        return bonuses[jobType].middle;
      }

      return bonuses[jobType].high;
    }

    function selectRelevantReasons(reasons, jobType) {
      const keywordMap = {
        WEB_PRODUCE: [
          "Web",
          "案件",
          "在宅",
          "副業",
          "細かな",
          "制作"
        ],
        WEB_DESIGN: [
          "デザイン",
          "見た目",
          "感性",
          "配置",
          "ポートフォリオ"
        ],
        VIDEO_EDIT: [
          "動画",
          "映像",
          "短期間",
          "細かな",
          "編集"
        ],
        ENGINEER: [
          "転職",
          "論理",
          "解決",
          "専門性",
          "コード",
          "本格的"
        ],
        WEB_WRITER: [
          "文章",
          "情報",
          "記事",
          "リサーチ",
          "在宅",
          "伝える"
        ]
      };

      const keywords = keywordMap[jobType] || [];
      const uniqueReasons = [...new Set(reasons)];

      const relevantReasons = uniqueReasons.filter(
        (reason) =>
          keywords.some((keyword) => reason.includes(keyword))
      );

      const fallbackReasons = uniqueReasons.filter(
        (reason) => !relevantReasons.includes(reason)
      );

      return [
        ...relevantReasons,
        ...fallbackReasons
      ].slice(0, 4);
    }

    function createEmptyScores() {
      return JOB_KEYS.reduce((scores, jobType) => {
        scores[jobType] = 0;
        return scores;
      }, {});
    }

    function addScores(targetScores, additionalScores) {
      JOB_KEYS.forEach((jobType) => {
        targetScores[jobType] +=
          Number(additionalScores?.[jobType]) || 0;
      });
    }

    function getTopJobType(scores) {
      const priority = [
        "ENGINEER",
        "WEB_PRODUCE",
        "WEB_DESIGN",
        "WEB_WRITER",
        "VIDEO_EDIT"
      ];

      return [...JOB_KEYS].sort((typeA, typeB) => {
        const difference =
          (Number(scores[typeB]) || 0) -
          (Number(scores[typeA]) || 0);

        if (difference !== 0) {
          return difference;
        }

        return (
          priority.indexOf(typeA) -
          priority.indexOf(typeB)
        );
      })[0];
    }

    function sortJobTypesByScore(scores) {
      return [...JOB_KEYS].sort((typeA, typeB) => {
        const difference =
          (Number(scores[typeB]) || 0) -
          (Number(scores[typeA]) || 0);

        if (difference !== 0) {
          return difference;
        }

        return (
          JOB_KEYS.indexOf(typeA) -
          JOB_KEYS.indexOf(typeB)
        );
      });
    }

    function saveState() {
      const payload = {
        version: 2,
        currentIndex: state.currentIndex,
        answers: state.answers,
        screen: state.screen,
        savedAt: Date.now()
      };

      try {
        localStorage.setItem(
          STORAGE_KEY,
          JSON.stringify(payload)
        );
      } catch (error) {
        console.warn(
          "診断状態を保存できませんでした。",
          error
        );
      }
    }

    function loadState() {
      try {
        const rawData = localStorage.getItem(STORAGE_KEY);

        if (!rawData) {
          return null;
        }

        const parsedData = JSON.parse(rawData);

        if (
          !parsedData ||
          !Array.isArray(parsedData.answers) ||
          parsedData.answers.length !== questions.length
        ) {
          return null;
        }

        const normalizedAnswers = parsedData.answers.map(
          (answer, index) => {
            if (
              answer === null ||
              answer === undefined
            ) {
              return null;
            }

            const numericAnswer = Number(answer);
            const optionCount =
              questions[index]?.options.length || 0;

            if (
              !Number.isInteger(numericAnswer) ||
              numericAnswer < 0 ||
              numericAnswer >= optionCount
            ) {
              return null;
            }

            return numericAnswer;
          }
        );

        return {
          currentIndex: Number.isInteger(parsedData.currentIndex)
            ? Math.min(
                Math.max(parsedData.currentIndex, 0),
                questions.length - 1
              )
            : 0,
          answers: normalizedAnswers,
          screen: [
            "start",
            "question",
            "middle",
            "result"
          ].includes(parsedData.screen)
            ? parsedData.screen
            : "start",
          savedAt: parsedData.savedAt || 0
        };
      } catch (error) {
        console.warn(
          "診断状態を読み込めませんでした。",
          error
        );

        return null;
      }
    }

    function clearState() {
      try {
        localStorage.removeItem(STORAGE_KEY);
      } catch (error) {
        console.warn(
          "診断状態を削除できませんでした。",
          error
        );
      }
    }

    function applySavedState(savedState) {
      state.currentIndex = savedState.currentIndex;
      state.answers = [...savedState.answers];
      state.screen = savedState.screen;
    }

    function restoreSavedState() {
      const savedState = loadState();

      if (!savedState) {
        state.screen = "start";
        showOnly("start");
        clearHash();
        return;
      }

      applySavedState(savedState);

      if (
        state.screen === "result" &&
        isCompleteAnswers(state.answers)
      ) {
        showResult(false);
        return;
      }

      if (
        state.screen === "middle" &&
        canShowMiddle(state.answers)
      ) {
        state.currentIndex = 6;
        replaceHash("middle");
        renderMiddleScreen();
        return;
      }

      if (state.screen === "question") {
        const firstUnansweredIndex = state.answers.findIndex(
          (answer) => answer === null
        );

        if (
          firstUnansweredIndex >= 0 &&
          state.currentIndex > firstUnansweredIndex
        ) {
          state.currentIndex = firstUnansweredIndex;
        }

        replaceHash("question");
        renderQuestion();
        return;
      }

      showOnly("start");
      clearHash();
    }

    function showOnly(screenName) {
      startScreen.classList.add("hidden");
      questionScreen.classList.add("hidden");
      middleScreen.classList.add("hidden");
      resultScreen.classList.add("hidden");

      if (screenName === "start") {
        startScreen.classList.remove("hidden");
      }

      if (screenName === "question") {
        questionScreen.classList.remove("hidden");
      }

      if (screenName === "middle") {
        middleScreen.classList.remove("hidden");
      }

      if (screenName === "result") {
        resultScreen.classList.remove("hidden");
      }
    }

    function setHash(hashName) {
      if (!hashName) {
        clearHash();
        return;
      }

      const targetHash = `#${hashName}`;

      if (location.hash === targetHash) {
        return;
      }

      history.pushState(
        {
          screen: hashName
        },
        "",
        targetHash
      );
    }

    function replaceHash(hashName) {
      if (!hashName) {
        clearHash();
        return;
      }

      history.replaceState(
        {
          screen: hashName
        },
        "",
        `#${hashName}`
      );
    }

    function clearHash() {
      history.replaceState(
        {
          screen: "start"
        },
        "",
        `${location.pathname}${location.search}`
      );
    }

    function canShowMiddle(answers) {
      return (
        Array.isArray(answers) &&
        answers
          .slice(0, 7)
          .every((answer) => answer !== null)
      );
    }

    function isCompleteAnswers(answers) {
      return (
        Array.isArray(answers) &&
        answers.length === questions.length &&
        answers.every((answer) => answer !== null)
      );
    }

    function restartDiagnosis() {
      clearState();

      state.currentIndex = 0;
      state.answers = Array(questions.length).fill(null);
      state.screen = "start";

      resultScreen.innerHTML = "";
      middleScreen.innerHTML = "";

      clearHash();
      showOnly("start");
      scrollToTop();
    }

    function scrollToTop() {
      window.scrollTo({
        top: 0,
        left: 0,
        behavior: "smooth"
      });
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }
  </script>
