  <style>
    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: "Noto Sans JP", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      color: #1e293b;
      background:
        radial-gradient(circle at 12% 7%, rgba(37, 99, 235, 0.3), transparent 26%),
        radial-gradient(circle at 88% 18%, rgba(14, 165, 233, 0.18), transparent 28%),
        linear-gradient(180deg, #eff6ff 0%, #f8fafc 50%, #ffffff 100%);
    }

    .screen {
      animation: fadeSlide 0.32s ease;
    }

    @keyframes fadeSlide {
      from {
        opacity: 0;
        transform: translateY(14px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .keep-text {
      word-break: keep-all;
      overflow-wrap: anywhere;
      line-height: 1.75;
    }

    .choice-card,
    .primary-btn,
    .secondary-btn,
    .cta-btn {
      transition: all 0.3s ease;
    }

    .choice-card:hover {
      transform: translateY(-2px);
      border-color: #2563eb;
      background: #eff6ff;
      box-shadow: 0 14px 30px rgba(37, 99, 235, 0.14);
    }

    .choice-card.is-selected {
      border-color: #2563eb;
      background: #dbeafe;
      box-shadow: 0 14px 30px rgba(37, 99, 235, 0.18);
    }

    .primary-btn:hover,
    .secondary-btn:hover,
    .cta-btn:hover {
      transform: translateY(-2px);
      filter: brightness(0.98);
    }

    .primary-btn:active,
    .secondary-btn:active,
    .cta-btn:active {
      transform: translateY(1px) scale(0.99);
    }

    .hero-card {
      position: relative;
      background:
        linear-gradient(135deg, rgba(30, 64, 175, 0.98) 0%, rgba(37, 99, 235, 0.96) 48%, rgba(14, 165, 233, 0.94) 100%);
    }

    .hero-card::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.08) 1px, transparent 1px);
      background-size: 28px 28px;
      mask-image: linear-gradient(180deg, rgba(0, 0, 0, 0.72), transparent 86%);
      pointer-events: none;
    }

    .hero-orb {
      position: absolute;
      border-radius: 9999px;
      pointer-events: none;
    }

    .hero-chip {
      background: rgba(255, 255, 255, 0.16);
      border: 1px solid rgba(255, 255, 255, 0.22);
      backdrop-filter: blur(16px);
    }

    .glass-card {
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(18px);
    }

    .shine {
      position: relative;
      overflow: hidden;
    }

    .shine::after {
      content: "";
      position: absolute;
      top: 0;
      left: -120%;
      width: 70%;
      height: 100%;
      background: linear-gradient(120deg, transparent, rgba(255, 255, 255, 0.35), transparent);
      transform: skewX(-18deg);
      transition: left 0.8s ease;
    }

    .shine:hover::after {
      left: 130%;
    }

    .cta-btn {
      position: relative;
      overflow: hidden;
      min-height: 56px;
      background:
        radial-gradient(circle at 18% 20%, rgba(255, 255, 255, 0.32), transparent 28%),
        linear-gradient(135deg, #10b981 0%, #22c55e 45%, #f59e0b 100%);
      box-shadow:
        0 18px 35px rgba(16, 185, 129, 0.35),
        0 0 0 1px rgba(255, 255, 255, 0.18) inset;
    }

    .cta-btn::before {
      content: "";
      position: absolute;
      inset: 2px;
      border-radius: 1rem;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.22), transparent 55%);
      pointer-events: none;
    }

    .cta-btn::after {
      content: "";
      position: absolute;
      top: -30%;
      left: -45%;
      width: 42%;
      height: 170%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.5), transparent);
      transform: rotate(18deg);
      transition: left 0.72s ease;
      pointer-events: none;
    }

    .cta-btn:hover {
      box-shadow:
        0 24px 48px rgba(245, 158, 11, 0.36),
        0 0 0 1px rgba(255, 255, 255, 0.2) inset;
    }

    .cta-btn:hover::after {
      left: 120%;
    }

    .bar-fill {
      transition: width 0.65s ease;
    }

    @media (max-width: 390px) {
      main {
        padding: 16px 12px;
      }

        font-size: 26px;
        line-height: 1.24;
      }

    const state = {
      currentIndex: 0,
      answers: Array(questions.length).fill(null),
      screen: 'start'
    };

    const startScreen = document.getElementById('startScreen');
    const questionScreen = document.getElementById('questionScreen');
    const middleScreen = document.getElementById('middleScreen');
    const resultScreen = document.getElementById('resultScreen');
    const startBtn = document.getElementById('startBtn');
    const questionCount = document.getElementById('questionCount');
    const questionCategory = document.getElementById('questionCategory');
    const progressBar = document.getElementById('progressBar');
    const questionText = document.getElementById('questionText');
    const choices = document.getElementById('choices');
    const backBtn = document.getElementById('backBtn');
    const nextBtn = document.getElementById('nextBtn');

    startBtn.addEventListener('click', () => {
      state.currentIndex = 0;
      state.screen = 'question';
      saveState();
      setHash('question');
      showOnly('question');
      renderQuestion();
    });

    backBtn.addEventListener('click', () => {
      if (state.currentIndex === 0) {
        state.screen = 'start';
        saveState();
        clearHash();
        showOnly('start');
        return;
      }

      if (state.currentIndex === 7) {
        state.screen = 'middle';
        saveState();
        setHash('middle');
        showOnly('middle');
        renderMiddleScreen();
        return;
      }

      state.currentIndex -= 1;
      state.screen = 'question';
      saveState();
      setHash('question');
      renderQuestion();
    });

    nextBtn.addEventListener('click', () => {
      if (state.answers[state.currentIndex] === null) return;

      if (state.currentIndex === 6) {
        state.screen = 'middle';
        saveState();
        setHash('middle');
        showOnly('middle');
        renderMiddleScreen();
        window.scrollTo({ top: 0, behavior: 'smooth' });
        return;
      }

      if (state.currentIndex === questions.length - 1) {
        showResult();
        return;
      }

      state.currentIndex += 1;
      state.screen = 'question';
      saveState();
      setHash('question');
      renderQuestion();
    });

    window.addEventListener('DOMContentLoaded', () => {
      restoreSavedState();
    });

    window.addEventListener('pageshow', () => {
      const saved = loadState();

      if (!saved) return;

      if (location.hash === '#result' && saved.screen === 'result' && isCompleteAnswers(saved.answers)) {
        applySavedState(saved);
        showResult(false);
      }
    });

    window.addEventListener('popstate', () => {
      const saved = loadState();

      if (location.hash === '#result' && saved && saved.screen === 'result' && isCompleteAnswers(saved.answers)) {
        applySavedState(saved);
        showResult(false);
        return;
      }

      if (location.hash === '#middle' && saved && canShowMiddle(saved.answers)) {
        applySavedState(saved);
        state.screen = 'middle';
        state.currentIndex = 6;
        showOnly('middle');
        renderMiddleScreen();
        return;
      }

      if (location.hash === '#question' && saved) {
        applySavedState(saved);
        state.screen = 'question';
        showOnly('question');
        renderQuestion();
        return;
      }

      showOnly('start');
    });

    function renderQuestion() {
      const q = questions[state.currentIndex];
      const selected = state.answers[state.currentIndex];
      const sectionInfo = getQuestionSectionInfo(state.currentIndex);

      showOnly('question');

      questionCount.textContent = `Question ${sectionInfo.current} / ${sectionInfo.total}`;
      questionCategory.textContent = sectionInfo.categoryLabel;
      questionText.textContent = q.question;
      progressBar.style.width = `${(sectionInfo.current / sectionInfo.total) * 100}%`;
      nextBtn.disabled = selected === null;
      nextBtn.textContent = state.currentIndex === questions.length - 1 ? '診断結果を見る' : '次へ';

      choices.innerHTML = '';

      q.options.forEach((option, optionIndex) => {
        const button = document.createElement('button');
        button.type = 'button';
        button.className = [
          'choice-card w-full rounded-2xl border p-4 text-left',
          selected === optionIndex ? 'is-selected' : 'border-slate-200 bg-white'
        ].join(' ');

        button.innerHTML = `
          <div class="flex items-start gap-3">
            <span class="flex h-8 w-8 shrink-0 items-center justify-center rounded-full ${selected === optionIndex ? 'bg-blue-600 text-white' : 'bg-slate-100 text-slate-500'} text-sm font-black">
              ${option.label}
            </span>
            <span class="keep-text pt-1 text-sm font-bold leading-6 text-slate-800">${escapeHtml(option.text)}</span>
          </div>
        `;

        button.addEventListener('click', () => {
          state.answers[state.currentIndex] = optionIndex;
          state.screen = 'question';
          saveState();
          renderQuestion();
        });

        choices.appendChild(button);
      });

      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function getQuestionSectionInfo(index) {
      if (index <= 6) {
        return {
          current: index + 1,
          total: 7,
          categoryLabel: 'キャリア診断'
        };
      }

      return {
        current: index - 6,
        total: 5,
        categoryLabel: 'Web知識クイズ'
      };
    }

    function renderMiddleScreen() {
      if (!canShowMiddle(state.answers)) {
        showOnly('start');
        return;
      }

      const careerResult = calculateCareerOnlyResult();
      const content = resultContents[careerResult.type];

      middleScreen.innerHTML = `
        <div class="overflow-hidden rounded-[30px] bg-white shadow-2xl shadow-blue-100/80">

    function createMiddleScoreBars(result) {
      const labels = {
        SELF: '独学',
        SIDE: '副業',
        FREE: 'フリーランス',
        CAREER: '転職'
      };

      return Object.keys(labels).map((key) => {
        const isTop = key === result.type;
        return `
          <div>
            <div class="mb-1 flex justify-between text-xs">
              <span class="${isTop ? 'font-black text-blue-700' : 'font-bold text-slate-600'}">${labels[key]}</span>
              <span class="${isTop ? 'font-black text-blue-700' : 'font-bold text-slate-500'}">${result.scorePercentages[key]}%</span>
            </div>
            <div class="h-2.5 overflow-hidden rounded-full bg-white">
              <div class="h-full rounded-full ${isTop ? 'bg-blue-600' : 'bg-slate-300'}" style="width:${result.scorePercentages[key]}%;"></div>
            </div>
          </div>
        `;
      }).join('');
    }

    function showResult(shouldPushHash = true) {
      if (!isCompleteAnswers(state.answers)) {
        showOnly('start');
        return;
      }

      const result = calculateResult();

      state.currentIndex = questions.length - 1;
      state.screen = 'result';
      saveState();

      if (shouldPushHash) setHash('result');

      showOnly('result');
      resultScreen.innerHTML = createResultHtml(result);

      setTimeout(() => {
        document.querySelectorAll('[data-bar]').forEach((bar) => {
          bar.style.width = bar.dataset.width;
        });
      }, 120);

      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function calculateCareerOnlyResult() {
      const scores = { SELF: 0, SIDE: 0, FREE: 0, CAREER: 0 };

      questions.slice(0, 7).forEach((q, index) => {
        const answerIndex = state.answers[index];
        const option = q.options[answerIndex];

        Object.keys(scores).forEach((key) => {
          scores[key] += option.scores[key] || 0;
        });
      });

      const type = getMaxType(scores);
      const maxScore = Math.max(...Object.values(scores));
      const scorePercentages = {};

      Object.keys(scores).forEach((key) => {
        scorePercentages[key] = maxScore === 0 ? 0 : Math.round((scores[key] / maxScore) * 100);
      });

      return { scores, type, scorePercentages };
    }

    function calculateResult() {
      const scores = { SELF: 0, SIDE: 0, FREE: 0, CAREER: 0 };
      let knowledgeScore = 0;
      const reasons = [];
      const skillResults = {
        HTML: 0,
        CSS: 0,
        JavaScript: 0,
        Responsive: 0,
        Form: 0
      };

      questions.forEach((q, index) => {
        const answerIndex = state.answers[index];
        const option = q.options[answerIndex];

        if (q.type === 'career') {
          Object.keys(scores).forEach((key) => {
            scores[key] += option.scores[key] || 0;
          });
          reasons.push(option.reason);
        }

        if (q.type === 'knowledge') {
          if (option.isCorrect) {
            knowledgeScore += 1;
            skillResults[q.skill] = 1;
          }
        }
      });

      const type = getMaxType(scores);
      const maxScore = Math.max(...Object.values(scores));
      const scorePercentages = {};

      Object.keys(scores).forEach((key) => {
        scorePercentages[key] = maxScore === 0 ? 0 : Math.round((scores[key] / maxScore) * 100);
      });

      return {
        type,
        scores,
        scorePercentages,
        knowledgeScore,
        level: getKnowledgeLevel(knowledgeScore),
        content: resultContents[type],
        reasons: [...new Set(reasons)].slice(0, 4),
        skillResults
      };
    }

    function getMaxType(scores) {
      const priority = ['CAREER', 'FREE', 'SIDE', 'SELF'];

      return Object.keys(scores).sort((a, b) => {
        if (scores[b] === scores[a]) {
          return priority.indexOf(a) - priority.indexOf(b);
        }
        return scores[b] - scores[a];
      })[0];
    }

    function getKnowledgeLevel(score) {
      if (score === 0) {
        return {
          label: '完全初心者レベル',
          stars: 1,
          current: '未経験初心者',
          period: '8〜10か月',
          description: 'これから基礎を学び始める段階です。最初はHTML/CSSから順番に進めるのがおすすめです。'
        };
      }

      if (score <= 2) {
        return {
          label: '初心者レベル',
          stars: 2,
          current: '初心者',
          period: '5〜7か月',
          description: '基礎をこれから固めていく段階です。焦らず順番に学べば十分伸ばせます。'
        };
      }

      if (score <= 4) {
        return {
          label: '初級レベル',
          stars: 3,
          current: '初級者',
          period: '4〜6か月',
          description: '基本知識はあります。実際に手を動かす課題で理解を深めると伸びやすい段階です。'
        };
      }

      return {
        label: '中級レベル',
        stars: 5,
        current: '中級者',
        period: '3〜5か月',
        description: '基礎知識はかなり身についています。実案件やポートフォリオ制作に進みやすい状態です。'
      };
    }

      return `
        <section class="rounded-[26px] bg-white p-5 shadow-lg shadow-blue-100/50">
          <p class="text-xs font-black text-blue-600">YOUR ROUTE</p>
          <h3 class="mt-1 text-lg font-black text-slate-900">現在地とゴール</h3>

          <div class="mt-5 space-y-3">
            ${timelineCard('01', '現在地', `${result.level.current}｜目安 ${result.level.period}`, 'bg-slate-100 text-slate-600')}
            ${timelineCard('02', '目標', result.content.goal, 'bg-blue-100 text-blue-600')}
            ${timelineCard('03', 'ゴール', result.content.finalGoal, 'bg-emerald-100 text-emerald-600')}
          </div>
        </section>
      `;
    }

    function timelineCard(number, label, text, colorClass) {
      return `
        <div class="flex gap-3 rounded-2xl border border-slate-200 bg-white p-4">
          <div class="flex h-10 w-10 shrink-0 items-center justify-center rounded-full ${colorClass} text-sm font-black">
            ${number}
          </div>
          <div>
            <p class="text-xs font-black text-slate-400">${label}</p>
            <p class="mt-1 text-sm font-black leading-6 text-slate-800 keep-text">${text}</p>
          </div>
        </div>
      `;
    }

    function createReasonHtml(result) {
      return `
        <section class="rounded-[26px] bg-white p-5 shadow-lg shadow-blue-100/50">
          <p class="text-xs font-black text-blue-600">WHY THIS PLAN</p>
          <h3 class="mt-1 text-lg font-black text-slate-900">おすすめ理由</h3>

          <div class="mt-4 space-y-3">
            ${result.reasons.map(reason => `
              <div class="flex gap-3 rounded-2xl bg-blue-50 p-4">
                <span class="flex h-6 w-6 shrink-0 items-center justify-center rounded-full bg-blue-600 text-xs font-black text-white">✓</span>
                <p class="text-sm font-bold leading-6 text-slate-700 keep-text">${reason}</p>
              </div>
            `).join('')}
          </div>
        </section>
      `;
    }

    function createRoadmapHtml(result) {
      return `
        <section class="rounded-[26px] bg-white p-5 shadow-lg shadow-blue-100/50">
          <p class="text-xs font-black text-blue-600">PERSONAL ROADMAP</p>
          <h3 class="mt-1 text-lg font-black text-slate-900">あなた専用ロードマップ</h3>

          <div class="mt-5 space-y-4">
            ${result.content.roadmap.map((step, index) => `
              <div class="relative flex gap-4">
                <div class="flex flex-col items-center">
                  <div class="flex h-11 w-11 items-center justify-center rounded-full bg-blue-600 text-sm font-black text-white shadow-md shadow-blue-100">
                    ${step[0]}
                  </div>
                  ${index !== result.content.roadmap.length - 1 ? '<div class="mt-2 h-12 w-[2px] bg-blue-100"></div>' : ''}
                </div>
                <div class="pb-3">
                  <p class="text-xs font-black text-blue-600">${step[1]}</p>
                  <p class="mt-1 text-sm font-black text-slate-900 keep-text">${step[2]}</p>
                  <p class="mt-1 text-sm font-medium leading-6 text-slate-600 keep-text">${step[3]}</p>
                </div>
              </div>
            `).join('')}
          </div>
        </section>
      `;
    }

    function createPlanHtml(result) {
      const content = result.content;

      return `
        <section class="rounded-[26px] bg-white p-5 shadow-lg shadow-blue-100/50">
          <p class="text-xs font-black text-blue-600">RECOMMENDED PLAN</p>
          <h3 class="mt-1 text-lg font-black text-slate-900">おすすめプラン紹介</h3>

          <div class="mt-4 rounded-2xl bg-gradient-to-br from-blue-700 to-sky-400 p-5 text-white">
            <p class="text-sm font-black text-blue-100">あなたにおすすめ</p>
            <p class="mt-1 text-2xl font-black keep-text">${content.label}</p>
          </div>

          <div class="mt-4 grid gap-3">
            ${infoCard('特徴', content.planFeatures)}
            ${infoCard('向いている人', content.suitableFor)}
            ${infoCard('サポート内容', content.support)}
          </div>

          <a href="${content.ctaUrl}" class="primary-btn mt-5 block rounded-2xl bg-blue-600 px-5 py-4 text-center text-sm font-black text-white shadow-lg shadow-blue-100">
            ${content.ctaText}
          </a>
        </section>
      `;
    }

    function infoCard(title, items) {
      return `
        <div class="rounded-2xl border border-slate-200 bg-slate-50 p-4">
          <p class="text-sm font-black text-slate-900">${title}</p>
          <ul class="mt-2 space-y-1 text-sm font-medium leading-6 text-slate-600">
            ${items.map(item => `<li class="keep-text">・${item}</li>`).join('')}
          </ul>
        </div>
      `;
    }

    function createCtaHtml(result) {
      return `
        <section class="overflow-hidden rounded-[30px] bg-gradient-to-br from-blue-950 via-blue-900 to-slate-950 p-5 text-white shadow-2xl shadow-blue-100/80">
          <p class="inline-flex rounded-full bg-white/10 px-3 py-1 text-xs font-black text-emerald-200">
            診断結果をもとに相談できます
          </p>

          <h3 class="mt-4 text-2xl font-black leading-tight keep-text">
            あなた専用の学習プランを<br />
            無料メンターに相談してみませんか？
          </h3>

          <p class="mt-3 text-sm font-medium leading-7 text-blue-50 keep-text">
            「自分に本当に合っている？」「どのプラン・コースを選ぶべき？」という疑問を、無料メンター相談で確認できます。
          </p>

          <a href="${result.content.consultationUrl}" class="cta-btn mt-6 block rounded-2xl px-5 py-4 text-center text-base font-black text-white">
            無料相談する
          </a>

          <button onclick="restartDiagnosis()" class="secondary-btn mt-3 w-full rounded-2xl border border-white/30 bg-white/10 px-5 py-4 text-sm font-black text-white">
            もう一度診断する
          </button>
        </section>
      `;
    }

    function saveState() {
      const payload = {
        currentIndex: state.currentIndex,
        answers: state.answers,
        screen: state.screen,
        savedAt: Date.now()
      };

      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(payload));
      } catch (error) {
        console.warn('診断データの保存に失敗しました。', error);
      }
    }

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return null;

        const parsed = JSON.parse(raw);

        if (!parsed || !Array.isArray(parsed.answers)) return null;
        if (parsed.answers.length !== questions.length) return null;

        return parsed;
      } catch (error) {
        console.warn('診断データの読み込みに失敗しました。', error);
        return null;
      }
    }

    function clearState() {
      try {
        localStorage.removeItem(STORAGE_KEY);
      } catch (error) {
        console.warn('診断データの削除に失敗しました。', error);
      }
    }

    function applySavedState(saved) {
      state.currentIndex = typeof saved.currentIndex === 'number' ? saved.currentIndex : 0;
      state.answers = saved.answers;
      state.screen = saved.screen || 'start';
    }

    function restoreSavedState() {
      const saved = loadState();

      if (!saved) {
        showOnly('start');
        return;
      }

      applySavedState(saved);

      if ((location.hash === '#result' || state.screen === 'result') && isCompleteAnswers(state.answers)) {
        state.screen = 'result';
        showResult(false);
        replaceHash('result');
        return;
      }

      if ((location.hash === '#middle' || state.screen === 'middle') && canShowMiddle(state.answers)) {
        state.screen = 'middle';
        state.currentIndex = 6;
        showOnly('middle');
        renderMiddleScreen();
        replaceHash('middle');
        return;
      }

      if (location.hash === '#question' || state.screen === 'question') {
        state.screen = 'question';
        showOnly('question');
        renderQuestion();
        replaceHash('question');
        return;
      }

      showOnly('start');
    }

    function showOnly(screenName) {
      startScreen.classList.add('hidden');
      questionScreen.classList.add('hidden');
      middleScreen.classList.add('hidden');
      resultScreen.classList.add('hidden');

      if (screenName === 'start') startScreen.classList.remove('hidden');
      if (screenName === 'question') questionScreen.classList.remove('hidden');
      if (screenName === 'middle') middleScreen.classList.remove('hidden');
      if (screenName === 'result') resultScreen.classList.remove('hidden');
    }

    function setHash(hashName) {
      if (!hashName) {
        clearHash();
        return;
      }

      const targetHash = `#${hashName}`;
      if (location.hash === targetHash) return;

      history.pushState({ screen: hashName }, '', targetHash);
    }

    function replaceHash(hashName) {
      if (!hashName) {
        clearHash();
        return;
      }

      history.replaceState({ screen: hashName }, '', `#${hashName}`);
    }

    function clearHash() {
      history.replaceState(null, '', location.pathname + location.search);
    }

    function canShowMiddle(answers) {
      return answers.slice(0, 7).every(answer => answer !== null);
    }

    function isCompleteAnswers(answers) {
      return answers.every(answer => answer !== null);
    }

    function restartDiagnosis() {
      clearState();

      state.currentIndex = 0;
      state.answers = Array(questions.length).fill(null);
      state.screen = 'start';

      resultScreen.classList.add('hidden');
      middleScreen.classList.add('hidden');
      questionScreen.classList.add('hidden');
      startScreen.classList.remove('hidden');

      clearHash();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function renderStars(count) {
      return '★'.repeat(count) + '☆'.repeat(5 - count);
    }

    function escapeHtml(text) {
      return String(text)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }
  </script>
</body>
</html>
